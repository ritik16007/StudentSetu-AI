<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login - StudentSetu AI</title>

  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <h1>StudentSetu AI</h1>
      <p class="subtitle">Login to manage your student records</p>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit">Login</button>
      </form>

      <div class="divider">or</div>

      <!-- Signup Form -->
      <form id="signupForm">
        <h2>Create Account</h2>

        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input
            type="email"
            id="signupEmail"
            placeholder="Create your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input
            type="password"
            id="signupPassword"
            placeholder="Create password"
            required
          />
        </div>

        <button type="submit" class="signup-btn">Create Account</button>
      </form>

      <p class="privacy-note">
        Your password is handled securely. StudentSetu AI does not show or store passwords directly.
      </p>

      <p class="back-link">
        <a href="dashboard.html">Continue to Dashboard</a>
      </p>

    </div>
  </div>
<script>
  const loginForm = document.getElementById("loginForm");
  const signupForm = document.getElementById("signupForm");

  loginForm.addEventListener("submit", function (event) {
    event.preventDefault();
    window.location.href = "dashboard.html";
  });

  signupForm.addEventListener("submit", function (event) {
    event.preventDefault();
    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>
